            font-family: 'Roboto', sans-serif;

            width: 210mm;

    <script>
        // HÀM XỬ LÝ MODAL TẠO PROMPT VÀ GỌI AI
        function openPromptModal() {
            document.getElementById('prompt-modal').classList.remove('hidden');
        }

        function closePromptModal() {
            document.getElementById('prompt-modal').classList.add('hidden');
        }

        function generatePromptText() {
            const topic = document.getElementById('prompt-topic').value.trim();
            const grade = document.getElementById('prompt-grade').value;
            const book = document.getElementById('prompt-book').value;
            const count = parseInt(document.getElementById('prompt-count').value) || 10;
            const resultBox = document.getElementById('prompt-result');

            if (!topic) {
                alert("Vui lòng nhập chủ đề bài học (VD: Phương trình Elip)!");
                document.getElementById('prompt-topic').focus();
                return false;
            }

            let basic = Math.max(1, Math.round(count * 0.4));
            let adv = Math.max(1, Math.round(count * 0.3));
            let med = count - basic - adv;
            if (med < 1) med = 1;

            let promptStr = `Hãy soạn một chuyên đề học tập và rèn luyện về [${topic}].\n`;
            
            if (grade || book) {
                promptStr += `Hãy bám sát chương trình Toán `;
                if (grade) promptStr += `lớp ${grade} `;
                if (book) promptStr += `theo bộ sách ${book}`;
                promptStr += `.\n`;
            }

            promptStr += `\nBố cục chuyên đề bắt buộc phải tuân theo cấu trúc sau:
1. Tóm tắt kiến thức trọng tâm: Hệ thống hóa lại toàn bộ lý thuyết, định nghĩa và công thức cốt lõi. Bắt buộc bắt đầu bằng tiêu đề "I. TÓM TẮT KIẾN THỨC TRỌNG TÂM".
2. Các dạng toán thường gặp: Liệt kê các dạng bài trọng tâm của chủ đề này.
3. Đề luyện tập (${count} bài tập): Thiết kế hệ thống bài tập đi từ dễ đến khó, chia làm 3 phần:
   - Phần A - Cơ bản: ${basic} bài tập nhận biết, thông hiểu.
   - Phần B - Trung bình: ${med} bài tập yêu cầu tư duy biến đổi nhiều bước.
   - Phần C - Nâng cao & Thực tế: ${adv} bài tập vận dụng cao.
4. Lời giải chi tiết: Bắt buộc tách biệt hoàn toàn ở phần cuối cùng. Trình bày lời giải từng bước rõ ràng.

Lưu ý: Bạn chỉ được in ra văn bản chuyên đề. Không bao gồm các từ chào hỏi dư thừa ("Dưới đây là...", "Hy vọng...").`;

            resultBox.value = promptStr;
            return true;
        }

        function copyPromptText() {
            const resultBox = document.getElementById('prompt-result');
            const btnCopy = document.getElementById('btn-copy-prompt');
            if (!resultBox.value) return;
            resultBox.select();
            resultBox.setSelectionRange(0, 99999); 
            try {
                document.execCommand('copy');
                const originalHtml = btnCopy.innerHTML;
                btnCopy.innerHTML = '<i class="fas fa-check text-green-600"></i> <span class="text-green-600">Đã copy!</span>';
                setTimeout(() => {
                    btnCopy.innerHTML = originalHtml;
                }, 2000);
            } catch (err) {
                console.error('Không thể copy: ', err);
            }
        }

        // HÀM GỌI API GEMINI TRỰC TIẾP
        async function generateWithAI() {
            if (!generatePromptText()) return; 

            const promptText = document.getElementById('prompt-result').value;
            const overlay = document.getElementById('ai-loading-overlay');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');

            try {
                const apiKey = ""; // API Key do môi trường runtime cung cấp
                const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                const payload = {
                    contents: [{ parts: [{ text: promptText }] }],
                    systemInstruction: { parts: [{ text: "Bạn là một giáo viên Toán xuất sắc. Viết tài liệu giáo khoa theo đúng định dạng được yêu cầu, sử dụng chuẩn LaTeX cho công thức toán ($ cho inline, $$ cho display block). Tuyệt đối không chứa các đoạn chat giao tiếp dư thừa." }] }
                };

                const delays = [1000, 2000, 4000, 8000, 16000];
                let textResult = "";
                
                for (let i = 0; i < delays.length; i++) {
                    try {
                        const response = await fetch(endpoint, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload)
                        });

                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        
                        const result = await response.json();
                        textResult = result.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (textResult) break;
                    } catch (error) {
                        console.error(`Attempt ${i + 1} failed:`, error);
                        if (i === delays.length - 1) throw error;
                        await new Promise(r => setTimeout(r, delays[i]));
                    }
                }

                if (textResult) {
                    document.getElementById('input-text').value = textResult;
                    updatePreview();
                    closePromptModal();
                } else {
                    throw new Error("API response empty");
                }
            } catch(err) {
                alert("Đã xảy ra lỗi khi kết nối tới AI. Vui lòng thử lại sau.");
                console.error(err);
            } finally {
                overlay.classList.add('hidden');
                overlay.classList.remove('flex');
            }
        }


        document.addEventListener('DOMContentLoaded', () => {
            const inputText = document.getElementById('input-text');
            const a4Page = document.getElementById('a4-page');
            
            const fontFamilySelect = document.getElementById('font-family');
            const fontSizeInput = document.getElementById('font-size');
            const themeSelect = document.getElementById('theme-select');
            
            const autoFormatCheckbox = document.getElementById('auto-format');
            const linesPerQuestionInput = document.getElementById('lines-per-question');
            const linesCountVal = document.getElementById('lines-count-val');
            const linesCountWrapper = document.getElementById('lines-count-wrapper');
            
            const lineStyleRadios = document.querySelectorAll('input[name="line-style"]');
            const lineSpacingRange = document.getElementById('line-spacing');
            const lineColorInput = document.getElementById('line-color');

            // Cấu hình Theme Màu Sắc
            const themesConfig = {
                classic: { heading: '#000000', text: '#000000', line: '#cbd5e1', bullet: '#000000', boxBg: '#f3f4f6', boxBorder: '#e5e7eb' },
                ocean: { heading: '#1e3a8a', text: '#000000', line: '#bfdbfe', bullet: '#2563eb', boxBg: '#eff6ff', boxBorder: '#bfdbfe' },
                nature: { heading: '#14532d', text: '#000000', line: '#bbf7d0', bullet: '#16a34a', boxBg: '#f0fdf4', boxBorder: '#bbf7d0' }
            };

            themeSelect.addEventListener('change', (e) => {
                const theme = themesConfig[e.target.value];
                lineColorInput.value = theme.line; // Auto đổi màu kẻ tone-sur-tone
                updatePreview();
            });

            // Nạp dữ liệu mẫu
            const sampleData = String.raw`## PHƯƠNG TRÌNH ĐƯỜNG TRÒN
---

## I. TÓM TẮT KIẾN THỨC TRỌNG TÂM

Để làm tốt dạng toán này, em chỉ cần nắm vững 2 dạng phương trình cốt lõi và các hệ thức liên quan.

**1. Phương trình chính tắc**
Đường tròn $(C)$ có tâm $I(a, b)$ và bán kính $R > 0$ có phương trình:

$$(x - a)^2 + (y - b)^2 = R^2$$

**2. Phương trình tổng quát**
Phương trình có dạng:

$$x^2 + y^2 - 2ax - 2by + c = 0$$

Điều kiện để phương trình trên là phương trình của một đường tròn là: $a^2 + b^2 - c > 0$.
Khi đó, đường tròn có:

* Tâm $I(a, b)$
* Bán kính $R = \sqrt{a^2 + b^2 - c}$

---

## II. CÁC DẠNG TOÁN THƯỜNG GẶP

* **Dạng 1:** Nhận dạng phương trình đường tròn, xác định tâm và bán kính.
* **Dạng 2:** Viết phương trình đường tròn khi biết các yếu tố cơ bản (tâm, bán kính, đường kính, đi qua các điểm).
* **Dạng 3:** Viết phương trình tiếp tuyến của đường tròn (tại một điểm thuộc đường tròn hoặc kẻ từ một điểm ngoài đường tròn).
* **Dạng 4:** Bài toán ứng dụng thực tế sử dụng hệ tọa độ Descartes.

## III. ĐỀ LUYỆN TẬP (10 BÀI TẬP)

### Phần A: Cơ bản

**Bài 1:** Xác định tâm và bán kính của đường tròn có phương trình: $(x - 1)^2 + (y + 2)^2 = 9$.
**Bài 2:** Cho phương trình $x^2 + y^2 - 4x + 6y - 3 = 0$. Chứng minh đây là phương trình một đường tròn. Tìm tâm và bán kính.
**Bài 3:** Viết phương trình chính tắc của đường tròn tâm $I(2, -3)$ và có bán kính $R = 4$.
**Bài 4:** Viết phương trình đường tròn có đường kính $AB$, biết $A(1, 1)$ và $B(5, 3)$.

### Phần B: Trung bình

**Bài 5:** Viết phương trình đường tròn có tâm $I(1, -2)$ và tiếp xúc với đường thẳng $\Delta: 3x - 4y + 9 = 0$.
**Bài 6:** Viết phương trình tổng quát của đường tròn đi qua 3 điểm $A(0, 0)$, $B(4, 0)$ và $C(0, 3)$.
**Bài 7:** Viết phương trình tiếp tuyến của đường tròn $(C): (x - 1)^2 + (y + 2)^2 = 9$ tại điểm $M(1, 1)$ nằm trên đường tròn.

### Phần C: Nâng cao & Thực tế

**Bài 8:** Viết phương trình các tiếp tuyến của đường tròn $(C): x^2 + y^2 = 1$ được kẻ từ điểm ngoài $A(2, 0)$.
**Bài 9 (Thực tế - Vùng phủ sóng):** Một trạm phát sóng radar được đặt tại gốc tọa độ $O(0, 0)$ trên bản đồ với bán kính phủ sóng là 50 km. Một tàu thủy đang neo đậu tại vị trí $M(40, 40)$. Hỏi tàu có nằm trong vùng phủ sóng không? Viết phương trình mô tả ranh giới vùng phủ sóng.
**Bài 10 (Thực tế - Vòng đu quay):** Tại một khu vui chơi, một vòng đu quay khổng lồ có dạng hình tròn. Chọn hệ trục tọa độ $Oxy$ sao cho trục hoành $Ox$ là mặt đất, tâm của vòng đu quay nằm tại vị trí $I(10, 15)$ (đơn vị: mét). Biết điểm thấp nhất của ca-bin vòng đu quay cách mặt đất 5 mét. Hãy viết phương trình đường tròn mô tả vòng đu quay và tính chiều cao tối đa của ca-bin so với mặt đất.

            // BỘ ĐỊNH DẠNG DÙNG CHUNG CHO CẢ WEB & WORD
            function applyRegexFormatting(textWithPlaceholders) {
                let result = textWithPlaceholders;
                const currentTheme = themesConfig[themeSelect.value];

                // Đổi hoa thị (*) đầu dòng thành bullet (•) kèm màu theme
                result = result.replace(/^(\s*)\*(\s+)/gim, `$1<span style="color: ${currentTheme.bullet}; font-weight: bold;">•</span>$2`);

                // 1. Chuyển kí hiệu HR (---) thành đường gạch phân cách
                result = result.replace(/^\s*---\s*$/gim, '<div style="border-bottom: 1pt solid #ccc; margin: 10pt 0;"></div>');

                // 2. Căn giữa các mục "Phần A, B..." 
                const phanRegex = /^(?:\s*[#•\-\*]\s*)*(?:\*\*)?\s*(Phần\b.*?)(?:\*\*)?\s*$/gim;
                result = result.replace(phanRegex, `<div style="text-align: center; font-weight: bold; margin: 4pt 0; color: ${currentTheme.heading};">$1</div>`);

                // 3. Auto bold Đề mục tự do (I., II., Đề bài...)
                const sectionRegex = /^(?:\s*[#•\-\*]\s*)*(?:\*\*)?\s*([IVX]+\..*|Đề bài.*|Đáp án.*|Lời giải.*|Chapter.*|Chương.*|Dạng.*)(?:\*\*)?\s*$/gim;
                result = result.replace(sectionRegex, `<strong style="color: ${currentTheme.heading};">$1</strong>`);

                // 4. Nhận diện tiêu đề Markdown (Các dòng có dấu thăng ##) chưa bị gom ở trên
                result = result.replace(/^(?:#{1,6})\s+(.*)$/gim, `<strong style="color: ${currentTheme.heading};">$1</strong>`);

                // 5. In đậm cú pháp Markdown phổ biến (**chữ**)
                result = result.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

                // 6. In đậm tiền tố "Bài X:", "Câu Y:"
                const questionRegex = /^(\s*[•\-\*]\s*)?(Bài\s+[\w\d]+|Câu\s+[\w\d]+|Question\s+[\w\d]+|Đáp số)([:\-\.\)]?)/gim;
                result = result.replace(questionRegex, `<strong style="color: ${currentTheme.heading};">$1$2$3</strong>`);

                // Dọn dẹp các thẻ strong bị thừa 
                result = result.replace(/<strong>\s*<strong[^>]*>/g, '<strong>').replace(/<\/strong>\s*<\/strong>/g, '</strong>');
                result = result.replace(/\n/g, '<br>');

                return result;
            }

            // TỰ ĐỘNG BỔ SUNG VÀ BẢO VỆ DẤU CÁCH VẬT LÝ CHO CÔNG THỨC TOÁN
            function applyMathAutoSpacing(text) {
                // Bộ ký tự chứa toàn bộ chữ cái tiếng Việt, tiếng Anh và Số (Cả hoa và thường)
                const charClass = 'a-zA-Z0-9áàảãạăắằẳẵặâấầẩẫậéèẻẽẹêếềểễệíìỉĩịóòỏõọôốồổỗộơớờởỡợúùủũụưứừửữựýỳỷỹỵđĐÁÀẢÃẠĂẮẰẲẴẶÂẤẦẨẪẬÉÈẺẼẸÊẾỀỂỄỆÍÌỈĨỊÓÒỎÕỌÔỐỒỔỖỘƠỚỜỞỠỢÚÙỦŨỤƯỨỪỬỮỰÝỲỶỸỴ';
                
                // Sử dụng \s* để gộp tất cả khoảng trắng (nếu có) và thay bằng ĐÚNG 1 KÝ TỰ &nbsp;
                // &nbsp; là Non-breaking Space, ép MS Word KHÔNG được phép "nuốt" dấu cách khi render
                const regexBefore = new RegExp(`([${charClass}])\\s*(%%%MATH_\\d+%%%)`, 'g');
                const regexAfter = new RegExp(`(%%%MATH_\\d+%%%)\\s*([${charClass}])`, 'g');
                
                return text.replace(regexBefore, '$1&nbsp;$2').replace(regexAfter, '$1&nbsp;$2');
            }

            // Xử lý Text để Preview lên Web
            function formatTextForHtml(text) {
                const mathBlocks = [];
                let textWithPlaceholders = text.replace(/(\$\$[\s\S]*?\$\$|\$[\s\S]*?\$)/g, (match) => {
                    mathBlocks.push(match);
                    return `%%%MATH_${mathBlocks.length - 1}%%%`;
                });

                textWithPlaceholders = textWithPlaceholders.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                
                // Bơm dấu cách bảo vệ
                textWithPlaceholders = applyMathAutoSpacing(textWithPlaceholders);
                
                textWithPlaceholders = applyRegexFormatting(textWithPlaceholders);

                textWithPlaceholders = textWithPlaceholders.replace(/%%%MATH_(\d+)%%%/g, (match, i) => {
                    let mathText = mathBlocks[i];
                    const isDisplay = mathText.startsWith('$$');
                    
                    if (isDisplay) {
                        return `<div style="text-align: center; margin: 12px 0; width: 100%; overflow-x: auto;">${mathText}</div>`;
                    } else {
                        return `<span style="font-family: 'Cambria Math', serif;">${mathText}</span>`;
                    }
                });

                return textWithPlaceholders;
            }

                    return `background-image: url("data:image/svg+xml,${encodeURIComponent(svg)}"); background-size: ${spacing}px ${spacing}px; background-repeat: repeat;`;
                } else if (style === 'dotted') {
                    const svg = `<svg width="100%" height="${spacing}" xmlns="http://www.w3.org/2000/svg"><line x1="0" y1="${spacing-1}" x2="100%" y2="${spacing-1}" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-dasharray="1,12"/></svg>`;
                    return `background-image: url("data:image/svg+xml,${encodeURIComponent(svg)}"); background-size: 100% ${spacing}px; background-repeat: repeat;`;
                } else {
                    return `background-image: linear-gradient(to bottom, ${color} 1px, transparent 1px); background-size: 100% ${spacing}px; background-position: 0 calc(${spacing}px - 1px);`;
                }
            }

                        wordHtmlContent += `</div>`;

                        const preHtml = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
<head><meta charset='utf-8'><title>Worksheet</title></head><body>`;
                        const postHtml = "</body></html>";
                        const html = preHtml + wordHtmlContent + postHtml;

                        // -- ĐÓNG GÓI THÀNH .DOCX BẰNG JSZIP VÀ ALTCHUNK --
                        const zip = new JSZip();

                        zip.file("[Content_Types].xml", `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">\n  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>\n  <Default Extension="html" ContentType="text/html"/>\n  <Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>\n</Types>`);
                        
                        zip.file("_rels/.rels", `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">\n  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>\n</Relationships>`);
                        
                        zip.file("word/document.xml", `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">\n  <w:body>\n    <w:altChunk r:id="htmlChunk" />\n    <w:sectPr>\n      <w:pgSz w:w="11906" w:h="16838"/>\n      <w:pgMar w:top="720" w:right="720" w:bottom="720" w:left="720" w:header="720" w:footer="720" w:gutter="0"/>\n    </w:sectPr>\n  </w:body>\n</w:document>`);
                        
                        zip.file("word/_rels/document.xml.rels", `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">\n  <Relationship Id="htmlChunk" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/aFChunk" Target="htmlDoc.html"/>\n</Relationships>`);
                        
                        // Chèn nội dung HTML vào tệp altChunk, có BOM hỗ trợ tiếng Việt
                        zip.file("word/htmlDoc.html", '\ufeff' + html);

                        const blob = await zip.generateAsync({type: "blob"});
                        const url = URL.createObjectURL(blob);
                        
                        const downloadLink = document.createElement("a");
                        document.body.appendChild(downloadLink);
                        
                        downloadLink.href = url;
                        downloadLink.download = 'Worksheet_Hoc_Sinh.docx'; // Lưu dưới định dạng chuẩn docx
                        downloadLink.click();
                        
                        document.body.removeChild(downloadLink);
                        setTimeout(() => URL.revokeObjectURL(url), 100);
                        
                    } catch (err) {
                        console.error("Lỗi xuất Word:", err);
                        alert("Đã xảy ra lỗi khi tạo file Word. Vui lòng kiểm tra console.");
                    } finally {
                        btnDownload.innerHTML = originalBtnHtml;
                        btnDownload.disabled = false;
                    }
                }, 50); // Timeout 50ms
            };
        });
    </script>
</body>
</html>
